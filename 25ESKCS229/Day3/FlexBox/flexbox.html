<!DOCTYPE html>

    <title>Flexbox Navbar Challenge</title>
    <link rel="stylesheet" href="flexbox.css">
</head>
<body>

    <nav class="navbar">
        <!-- 1. Company Logo -->
        <div class="logo">
            <h2>M3phistophe7es</h2>

</html>
