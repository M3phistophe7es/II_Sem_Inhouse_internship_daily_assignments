<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Landing Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-custom py-3">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand fw-bold" href="#">DevSprint</a>
            <div class="d-flex align-items-center gap-3">
                <a href="#features" class="nav-link-custom">Features</a>
                <a href="#contact" class="nav-link-custom">Contact</a>
                <button id="themeToggle" class="btn btn-outline-primary btn-sm">Switch to Dark Mode</button>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <div class="row g-4 justify-content-center">
            
            <div class="col-12 text-center my-4">
                <h1 class="display-4 fw-bold">Welcome to the 30-Min Build Sprint</h1>
               <p class="lead adaptive-text">A beautiful interactive landing page featuring components built from scratch.</p>
            </div>

            <div class="col-md-5">
                <div class="card p-4 h-100 shadow-sm d-flex flex-column justify-content-center align-items-center text-center">
                    <h3 class="card-title mb-3">Click Counter Component</h3>
                    <div class="counter-display mb-3" id="counterValue">0</div>
                    <div class="d-flex gap-2">
                        <button id="clickBtn" class="btn btn-success px-4">Click Me!</button>
                        <button id="resetBtn" class="btn btn-secondary px-3">Reset</button>
                    </div>
                </div>
            </div>

            <div id="contact" class="col-md-6">
                <div class="card p-4 h-100 shadow-sm">
                    <h3 class="card-title mb-4">Get In Touch</h3>
                    <form id="sprintForm" novalidate>
                        
                        <div class="mb-3">
                            <label for="nameInput" class="form-label">Name</label>
                            <input type="text" class="form-control" id="nameInput" placeholder="Enter your name">
                            <div class="error-message" id="nameError"></div>
                        </div>

                        <div class="mb-3">
                            <label for="emailInput" class="form-label">Email address</label>
                            <input type="email" class="form-control" id="emailInput" placeholder="name@example.com">
                            <div class="error-message" id="emailError"></div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2">Submit Form</button>
                    </form>
                    <div id="successMessage" class="alert alert-success mt-3 d-none text-center" role="alert">
                        Form submitted successfully!
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
